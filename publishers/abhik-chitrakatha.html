<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>অভীক চিত্রকথা</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body data-publisher="অভীক চিত্রকথা">
    <header class="py-6 px-4">
        <div class="max-w-6xl mx-auto flex flex-col gap-6">
            <div class="flex flex-col md:flex-row justify-between items-center gap-6">
                <div class="flex items-center gap-4 w-full md:w-auto">
                    <a href="../index.html" class="home-link" aria-label="Home">
                        <svg class="home-link-icon" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M3 10.5 12 3l9 7.5"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M5.25 9.75V21h13.5V9.75"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.8" d="M9.75 21v-6h4.5v6"></path></svg>
                    </a>
                    <div>
                        <h1 id="pageBrandTitle" class="page-brand-title" lang="bn">অভীক চিত্রকথা</h1>
                        <p id="currentPublisherLabel" class="current-publisher-label" lang="bn"></p>
                    </div>
                </div>
                <div class="relative w-full max-w-md">
                    <input type="text" id="searchInput" placeholder="খুঁজুন (নাম, চরিত্র বা গল্প)..."
                        class="w-full bg-slate-900 border border-slate-700 text-white rounded-xl py-3 px-12 focus:ring-2 focus:ring-yellow-400 outline-none transition-all">
                    <span class="absolute left-4 top-3.5 opacity-30 text-xl">🔍</span>
                </div>
            </div>
        </div>
    </header>

    <main class="max-w-6xl mx-auto px-4 py-10">
        <div id="categoryContainer" class="flex flex-wrap gap-2 justify-center mb-12"></div>
        <div id="comicsGrid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-4 md:gap-6"></div>
        <div class="flex justify-center mt-20 items-center gap-8">
            <button id="prevPage" class="p-3 rounded-full border border-slate-700 hover:bg-slate-800 disabled:opacity-10 transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path></svg>
            </button>
            <span id="pageInfo" class="text-xs uppercase tracking-widest text-slate-400 font-bold">Page 01</span>
            <button id="nextPage" class="p-3 rounded-full border border-slate-700 hover:bg-slate-800 disabled:opacity-10 transition-all">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path></svg>
            </button>
        </div>
    </main>

    <div id="modal" class="fixed inset-0 hidden flex items-center justify-center p-4 z-50 overflow-y-auto">
        <div class="modal-content rounded-3xl max-w-5xl w-full relative shadow-2xl my-auto">
            <button onclick="closeModal()" class="absolute top-6 right-6 text-slate-400 hover:text-white z-10 bg-slate-800/50 rounded-full p-1">
                <svg class="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <div id="modalContent" class="p-5 md:p-8 flex flex-col md:flex-row gap-6 md:gap-8"></div>
        </div>
    </div>

    <script src="../js/app.js"></script>
</body>
</html>
