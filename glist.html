function groupData(data){

const grouped = {};

data.forEach(item => {

if(!grouped[item.publisher]){
grouped[item.publisher] = {
types:{},
directRows:[],
nameSet:new Set()
};
}

grouped[item.publisher].nameSet.add(item.name.trim());

if(!item.type || item.type.trim()===""){
grouped[item.publisher].directRows.push(item);
return;
}

if(!grouped[item.publisher].types[item.type]){
grouped[item.publisher].types[item.type]={
rows:[],
nameSet:new Set()
};
}

grouped[item.publisher].types[item.type].rows.push(item);
grouped[item.publisher].types[item.type].nameSet.add(item.name.trim());

});

return grouped;

}



const accordion = document.getElementById("accordion");
const searchBox = document.getElementById("searchBox");



function render(filteredData){

accordion.innerHTML="";

const grouped = groupData(filteredData);

Object.keys(grouped).forEach(publisher => {

const publisherCount = grouped[publisher].nameSet.size;

const publisherHeader = document.createElement("div");
publisherHeader.className="publisher";
publisherHeader.textContent = publisher + " (" + publisherCount + ")";

const publisherContent = document.createElement("div");
publisherContent.className="content";


/* rows with no type */

if(grouped[publisher].directRows.length>0){

let table = `
<table>
<thead>
<tr>
<th>Name</th>
<th>Grade</th>
</tr>
</thead>
<tbody>
`;

grouped[publisher].directRows.forEach(row => {

table += `
<tr>
<td>${row.name}</td>
<td>${row.format ? row.format : '<span class="empty">—</span>'}</td>
</tr>
`;

});

table += "</tbody></table>";

const directContent = document.createElement("div");
directContent.innerHTML = table;

publisherContent.appendChild(directContent);

}



/* types */

Object.keys(grouped[publisher].types).forEach(type => {

const typeHeader = document.createElement("div");
typeHeader.className="type";

const distinctCount = grouped[publisher].types[type].nameSet.size;

typeHeader.textContent = type + " (" + distinctCount + ")";

const typeContent = document.createElement("div");
typeContent.className="content";

let table = `
<table>
<thead>
<tr>
<th>Name</th>
<th>Grade</th>
</tr>
</thead>
<tbody>
`;

grouped[publisher].types[type].rows.forEach(row => {

table += `
<tr>
<td>${row.name}</td>
<td>${row.format ? row.format : '<span class="empty">—</span>'}</td>
</tr>
`;

});

table += "</tbody></table>";

typeContent.innerHTML = table;

typeHeader.onclick = function(){
typeContent.style.display =
typeContent.style.display==="block" ? "none":"block";
};

publisherContent.appendChild(typeHeader);
publisherContent.appendChild(typeContent);

});


publisherHeader.onclick = function(){
publisherContent.style.display =
publisherContent.style.display==="block" ? "none":"block";
};

accordion.appendChild(publisherHeader);
accordion.appendChild(publisherContent);

});

}



render(data);



searchBox.addEventListener("input",function(){

const query = this.value.trim().toLowerCase();

if(!query){
render(data);
return;
}

const filtered = data.filter(item =>
item.name.toLowerCase().includes(query)
);

render(filtered);

});

</script>
