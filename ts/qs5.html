<script>
const DATA=[{"id": "C01Q01", "category": "Candidate Set 01", "question": "[Theoretical] How would you explain the difference between AI, ML, and Generative AI to a beginner?", "answer": "AI is the broad field of making machines perform intelligent tasks. ML is a subset where systems learn patterns from data. Generative AI is a type of AI that creates new content such as text, images, code, or summaries."}, {"id": "C01Q02", "category": "Candidate Set 01", "question": "[Theoretical] Why do LLMs sometimes hallucinate even when the prompt looks clear?", "answer": "LLMs generate likely text based on patterns, not guaranteed truth. Hallucinations happen when the model lacks reliable context, overgeneralizes, or fills gaps with plausible-sounding information."}, {"id": "C01Q03", "category": "Candidate Set 01", "question": "[Coding] When should you use a Python dictionary instead of a list for AI app data lookup?", "answer": "Use a dictionary when you need fast lookup by key, such as user_id to profile, document_id to metadata, or tool_name to handler. Use a list when order matters or you must process every item sequentially."}, {"id": "C01Q04", "category": "Candidate Set 01", "question": "[Coding] When is a set better than a list for filtering retrieved document IDs?", "answer": "Use a set when you need uniqueness and fast membership checks, for example removing duplicate document IDs after vector search. Use a list when preserving ranking/order is more important."}, {"id": "C01Q05", "category": "Candidate Set 01", "question": "[Coding] What is the difference between sync and async API calls in an LLM chatbot?", "answer": "Synchronous calls block until the response returns and are simpler for short requests. Async calls are better for slow model calls, tool calls, batch processing, retries, or multiple independent requests running together."}, {"id": "C01Q06", "category": "Candidate Set 01", "question": "[Coding] When should you use try/except around an AI API call?", "answer": "Use try/except for network errors, timeouts, rate limits, invalid responses, and service failures. The handler should log the error, return a safe fallback, and avoid exposing secrets or raw stack traces to users."}, {"id": "C01Q07", "category": "Candidate Set 01", "question": "[Scenario] A chatbot answers correctly in testing but gives wrong answers to customers. What do you investigate first?", "answer": "Compare production inputs with test inputs, inspect retrieved context, prompts, model settings, conversation history, access permissions, and logs. The goal is to find what differs before changing the system."}, {"id": "C01Q08", "category": "Candidate Set 01", "question": "[Scenario] A user asks for confidential company data through the chatbot. What should happen?", "answer": "The system should check authorization before retrieval, refuse if the user lacks access, avoid revealing document snippets, and log the attempt for audit if required."}, {"id": "C01Q09", "category": "Candidate Set 01", "question": "[Scenario] Your RAG pipeline retrieves the right document but the final answer is still weak. Where is the likely issue?", "answer": "The issue is likely in answer synthesis: the prompt may not instruct the model to use the retrieved context clearly, cite evidence, or ignore unsupported information."}, {"id": "C01Q10", "category": "Candidate Set 01", "question": "[Scenario] The LLM response is accurate but too slow for users. What changes would you try?", "answer": "Reduce prompt size, stream tokens, cache frequent answers, use a smaller model for simple tasks, optimize retrieval, and move long work to background jobs."}, {"id": "C01Q11", "category": "Candidate Set 01", "question": "[Scenario] A stakeholder wants the model to always answer, even without evidence. What do you recommend?", "answer": "Do not force unsupported answers. Configure the system to say when evidence is missing, ask clarifying questions, or escalate to a human to reduce hallucination risk."}, {"id": "C01Q12", "category": "Candidate Set 01", "question": "[Scenario] A prompt injection says ?ignore previous rules.? How should the system respond?", "answer": "The system should treat it as untrusted user content, preserve system/developer instructions, avoid executing unsafe requests, and apply input/output guardrails."}, {"id": "C01Q13", "category": "Candidate Set 01", "question": "[Practical] What logs are useful for debugging an AI feature?", "answer": "Log request ID, timestamp, model version, prompt template version, retrieved source IDs, tool calls, latency, errors, and final outcome. Avoid logging sensitive raw data unless policy allows it."}, {"id": "C01Q14", "category": "Candidate Set 01", "question": "[Practical] What metrics would you track for a production chatbot?", "answer": "Track answer quality, hallucination reports, latency, token cost, retrieval hit rate, user feedback, escalation rate, errors, and safety/refusal events."}, {"id": "C01Q15", "category": "Candidate Set 01", "question": "[Practical] How would you document a RAG-based feature?", "answer": "Document data sources, chunking rules, embedding model, vector database, retrieval parameters, prompt template, citation behavior, known limitations, and update process."}, {"id": "C01Q16", "category": "Candidate Set 01", "question": "[Practical] What makes an AI feature safe to release?", "answer": "It needs evaluation, guardrails, access control, monitoring, rollback plan, clear limitations, user feedback capture, and human review for high-risk cases."}, {"id": "C01Q17", "category": "Candidate Set 01", "question": "[Interview] How would you explain a project where you used an LLM API?", "answer": "Describe the user problem, API flow, prompt strategy, tools or retrieval used, evaluation method, deployment constraints, and measurable impact."}, {"id": "C01Q18", "category": "Candidate Set 01", "question": "[Interview] If you do not know an AI interview answer, how should you respond?", "answer": "State what you know, clarify assumptions, reason from fundamentals, give a partial structured answer, and avoid pretending certainty."}, {"id": "C01Q19", "category": "Candidate Set 01", "question": "[Advanced] How do you choose between RAG and fine-tuning for enterprise knowledge?", "answer": "Use RAG for changing/private facts and source-grounded answers. Use fine-tuning for consistent behavior, tone, format, or domain task patterns. Many systems use both."}, {"id": "C01Q20", "category": "Candidate Set 01", "question": "[Advanced] What are the main failure modes of an AI agent?", "answer": "Common failures include tool misuse, infinite loops, bad planning, stale memory, permission mistakes, prompt injection, unclear stop conditions, and poor error recovery."}, {"id": "C02Q01", "category": "Candidate Set 02", "question": "[Theoretical] What is a transformer and why is self-attention important?", "answer": "A transformer is a neural network architecture that uses attention to relate tokens to each other. Self-attention helps the model understand context, references, and long-range dependencies."}, {"id": "C02Q02", "category": "Candidate Set 02", "question": "[Theoretical] What does ?context window? mean in an LLM?", "answer": "The context window is the maximum number of tokens the model can consider in one request, including input and output. Long content must be shortened, chunked, or retrieved selectively."}, {"id": "C02Q03", "category": "Candidate Set 02", "question": "[Coding] When should you use map/filter functions instead of a for loop?", "answer": "Use map/filter for simple transformations or filtering where readability stays high. Use a for loop when logic has multiple steps, error handling, branching, logging, or side effects."}, {"id": "C02Q04", "category": "Candidate Set 02", "question": "[Coding] When is batch processing better than one-by-one model calls?", "answer": "Batch processing is better for offline jobs, evaluations, embedding generation, and repeated tasks because it reduces overhead and can improve throughput. One-by-one calls are better for interactive user requests."}, {"id": "C02Q05", "category": "Candidate Set 02", "question": "[Coding] What is the difference between caching a response and caching retrieved context?", "answer": "Response caching stores the final answer for repeated same questions. Context caching stores retrieval results or source chunks, useful when different prompts reuse the same documents."}, {"id": "C02Q06", "category": "Candidate Set 02", "question": "[Coding] When should you use a schema validator for LLM output?", "answer": "Use schema validation when downstream code expects JSON, tool arguments, database fields, or UI-ready structured data. It prevents malformed model output from breaking the application."}, {"id": "C02Q07", "category": "Candidate Set 02", "question": "[Scenario] The model returns invalid JSON in production. What do you do?", "answer": "Use structured output or tool calling if available, add schema validation, retry with a repair prompt if safe, and return a controlled error if validation fails."}, {"id": "C02Q08", "category": "Candidate Set 02", "question": "[Scenario] A vector search result misses the most relevant policy. What might be wrong?", "answer": "Possible causes include poor chunking, weak embeddings, missing metadata filters, low top-k, no hybrid search, stale index, or lack of reranking."}, {"id": "C02Q09", "category": "Candidate Set 02", "question": "[Scenario] A model gives different answers after a version upgrade. How do you handle it?", "answer": "Run regression tests, compare outputs on a fixed evaluation set, inspect changed behavior, update prompts if needed, and roll back if quality drops."}, {"id": "C02Q10", "category": "Candidate Set 02", "question": "[Scenario] A multimodal model misreads an uploaded image. What safeguards help?", "answer": "Ask for clarification when confidence is low, avoid high-risk claims, use OCR or specialized vision checks if needed, and allow human review for sensitive decisions."}, {"id": "C02Q11", "category": "Candidate Set 02", "question": "[Scenario] Users complain the bot sounds too robotic. How do you improve it safely?", "answer": "Adjust tone instructions, add examples of preferred style, keep factual grounding, and evaluate that friendliness does not reduce accuracy or safety."}, {"id": "C02Q12", "category": "Candidate Set 02", "question": "[Scenario] A document contains conflicting policy versions. What should a RAG system do?", "answer": "Prefer the newest approved source, use metadata timestamps/versioning, cite the source used, and mention conflict or escalate if ambiguity remains."}, {"id": "C02Q13", "category": "Candidate Set 02", "question": "[Practical] How do you test prompt changes before release?", "answer": "Use a fixed test set, compare old and new outputs, check factuality, format, refusal behavior, latency, and cost before deploying."}, {"id": "C02Q14", "category": "Candidate Set 02", "question": "[Practical] What should be stored as metadata in a vector database?", "answer": "Store document ID, source, page/section, timestamp, version, author/team, access permissions, and content type for filtering and citations."}, {"id": "C02Q15", "category": "Candidate Set 02", "question": "[Practical] How do you reduce token cost in an AI application?", "answer": "Shorten prompts, retrieve fewer better chunks, cache results, summarize history, use smaller models for simple tasks, and set output length limits."}, {"id": "C02Q16", "category": "Candidate Set 02", "question": "[Practical] How do you monitor hallucinations?", "answer": "Use user feedback, human review samples, automated factuality checks, citation faithfulness checks, and dashboards tracking unsupported-answer rates."}, {"id": "C02Q17", "category": "Candidate Set 02", "question": "[Interview] How would you describe self-attention in one minute?", "answer": "Self-attention lets each token decide which other tokens matter for understanding it. This helps the model capture context, relationships, and meaning across a sequence."}, {"id": "C02Q18", "category": "Candidate Set 02", "question": "[Interview] How do you discuss tradeoffs in an AI system design interview?", "answer": "Compare accuracy, latency, cost, security, maintainability, evaluation, user experience, and failure recovery instead of choosing a tool blindly."}, {"id": "C02Q19", "category": "Candidate Set 02", "question": "[Advanced] When is hybrid search better than vector search alone?", "answer": "Hybrid search is better when exact terms, product names, IDs, legal phrases, or rare keywords matter along with semantic meaning."}, {"id": "C02Q20", "category": "Candidate Set 02", "question": "[Advanced] How would you design rollback for an LLM feature?", "answer": "Version prompts, model choices, retrieval settings, and tools. Keep previous versions available, monitor quality, and switch traffic back if regressions appear."}, {"id": "C03Q01", "category": "Candidate Set 03", "question": "[Theoretical] What is an embedding in AI search?", "answer": "An embedding is a numeric vector representing semantic meaning. Similar texts have vectors close together, enabling meaning-based search."}, {"id": "C03Q02", "category": "Candidate Set 03", "question": "[Theoretical] What is RLHF and why is it used?", "answer": "RLHF means Reinforcement Learning from Human Feedback. It helps align model outputs with human preferences such as helpfulness, safety, and clarity."}, {"id": "C03Q03", "category": "Candidate Set 03", "question": "[Coding] When should you use cosine similarity instead of exact keyword matching?", "answer": "Use cosine similarity for semantic matching where wording differs but meaning is similar. Use exact keyword matching for IDs, names, codes, legal terms, or required phrases."}, {"id": "C03Q04", "category": "Candidate Set 03", "question": "[Coding] When should you use top-k retrieval versus threshold-based retrieval?", "answer": "Use top-k when you always need a fixed number of candidates. Use a similarity threshold when you prefer returning nothing if confidence is too low."}, {"id": "C03Q05", "category": "Candidate Set 03", "question": "[Coding] What is the difference between chunk size and chunk overlap?", "answer": "Chunk size controls how much text each piece contains. Chunk overlap repeats some text between chunks to preserve context that crosses boundaries."}, {"id": "C03Q06", "category": "Candidate Set 03", "question": "[Coding] When is reranking useful after vector search?", "answer": "Reranking is useful when initial retrieval returns many decent candidates but order quality matters. A reranker can improve relevance before sending context to the LLM."}, {"id": "C03Q07", "category": "Candidate Set 03", "question": "[Scenario] A candidate says embeddings ?understand language perfectly.? How do you respond?", "answer": "Embeddings capture useful semantic patterns but are not perfect. They can miss context, domain meaning, negation, rare terms, or access-control requirements."}, {"id": "C03Q08", "category": "Candidate Set 03", "question": "[Scenario] A support bot cites sources but the answer contradicts them. What is wrong?", "answer": "The model may be ignoring or misusing retrieved context. Improve the prompt, require citation faithfulness, reduce temperature, and evaluate answer-grounding."}, {"id": "C03Q09", "category": "Candidate Set 03", "question": "[Scenario] An agent calls the wrong tool for a user request. What do you improve?", "answer": "Improve tool descriptions, argument schemas, intent routing, examples, permission checks, and add validation before tool execution."}, {"id": "C03Q10", "category": "Candidate Set 03", "question": "[Scenario] A model refuses safe questions too often. How do you tune behavior?", "answer": "Review refusal rules, examples, safety classifier thresholds, prompt wording, and evaluation cases to reduce over-refusal without weakening real safety controls."}, {"id": "C03Q11", "category": "Candidate Set 03", "question": "[Scenario] A production model starts drifting in quality. What signals do you check?", "answer": "Check input distribution, retrieval quality, user feedback, data freshness, model version, prompt changes, latency, and error rates."}, {"id": "C03Q12", "category": "Candidate Set 03", "question": "[Scenario] A business team wants AI-generated emails sent automatically. What is the safer design?", "answer": "Use approved data sources and templates, generate drafts, validate tone/facts, and require human review before sending externally."}, {"id": "C03Q13", "category": "Candidate Set 03", "question": "[Practical] How do you evaluate retrieval quality separately from answer quality?", "answer": "Test whether the retriever finds the correct source chunks using precision@k, recall@k, MRR, and human-labeled expected documents."}, {"id": "C03Q14", "category": "Candidate Set 03", "question": "[Practical] What access control rule matters most in enterprise RAG?", "answer": "Filter documents by user permissions before the LLM sees them. Post-generation filtering is too late because restricted content may already influence the answer."}, {"id": "C03Q15", "category": "Candidate Set 03", "question": "[Practical] How should an AI system handle ?I don?t know??", "answer": "It should be allowed to admit uncertainty, ask follow-up questions, cite missing evidence, or escalate instead of fabricating."}, {"id": "C03Q16", "category": "Candidate Set 03", "question": "[Practical] How do you make model outputs auditable?", "answer": "Store prompt version, model version, retrieved sources, tool calls, timestamps, evaluation labels, user context, and final response where policy permits."}, {"id": "C03Q17", "category": "Candidate Set 03", "question": "[Interview] How would you explain vector databases to a non-technical person?", "answer": "They are search systems that find information by meaning, not just exact words, which helps AI retrieve relevant knowledge from documents."}, {"id": "C03Q18", "category": "Candidate Set 03", "question": "[Interview] What story would you tell about improving an AI feature?", "answer": "Explain the original issue, measurement method, change made, result, and what tradeoff you accepted."}, {"id": "C03Q19", "category": "Candidate Set 03", "question": "[Advanced] What is the risk of giving agents too many tools?", "answer": "Too many tools can increase wrong-tool selection, security risk, latency, debugging difficulty, and unpredictable workflows. Tool access should be scoped."}, {"id": "C03Q20", "category": "Candidate Set 03", "question": "[Advanced] How do you evaluate alignment beyond accuracy?", "answer": "Measure helpfulness, harmlessness, refusal quality, bias, instruction following, user satisfaction, and behavior on adversarial or edge-case prompts."}, {"id": "C04Q01", "category": "Candidate Set 04", "question": "[Theoretical] What is AI governance in practical terms?", "answer": "AI governance is the set of policies, controls, documentation, reviews, and accountability practices that ensure AI systems are safe, compliant, and responsibly used."}, {"id": "C04Q02", "category": "Candidate Set 04", "question": "[Theoretical] Why is model evaluation different from normal software testing?", "answer": "Software tests often check deterministic outputs. Model evaluation measures probabilistic behavior across many examples, including quality, safety, latency, cost, and human judgment."}, {"id": "C04Q03", "category": "Candidate Set 04", "question": "[Coding] When should you use tool calling instead of asking the model to write free-form text?", "answer": "Use tool calling when the system needs structured arguments, external actions, database/API access, calculations, or reliable machine-readable output."}, {"id": "C04Q04", "category": "Candidate Set 04", "question": "[Coding] What is the difference between an API timeout and a retry policy?", "answer": "A timeout defines how long to wait before failing a request. A retry policy defines whether and how to try again after transient failures like rate limits or network errors."}, {"id": "C04Q05", "category": "Candidate Set 04", "question": "[Coding] When should you stream an LLM response?", "answer": "Stream when responses may take several seconds and users benefit from seeing partial output. Do not stream when you must validate the full response before showing it."}, {"id": "C04Q06", "category": "Candidate Set 04", "question": "[Coding] When is a queue better than direct request processing?", "answer": "Use a queue for long-running jobs, batch document processing, retries, rate-limit smoothing, and work that should continue even if the user closes the page."}, {"id": "C04Q07", "category": "Candidate Set 04", "question": "[Scenario] An AI API starts returning rate-limit errors. What changes help?", "answer": "Add exponential backoff, request batching, caching, queueing, concurrency limits, usage monitoring, and fallback behavior."}, {"id": "C04Q08", "category": "Candidate Set 04", "question": "[Scenario] A governance reviewer asks for proof that personal data is protected. What do you show?", "answer": "Show data flow, access controls, retention policy, encryption, redaction, audit logs, vendor settings, and evaluation of privacy risks."}, {"id": "C04Q09", "category": "Candidate Set 04", "question": "[Scenario] A generated answer violates brand policy. How do you reduce recurrence?", "answer": "Add brand guidelines to prompts, examples, prohibited phrases, output validation, review workflows, and evaluation cases for tone compliance."}, {"id": "C04Q10", "category": "Candidate Set 04", "question": "[Scenario] A deployment increases latency by 40%. What is your triage plan?", "answer": "Check model/provider latency, retrieval time, prompt size, network calls, logging overhead, concurrency, and recent config changes. Roll back if user impact is high."}, {"id": "C04Q11", "category": "Candidate Set 04", "question": "[Scenario] A user asks the model to summarize a huge PDF. What design handles it?", "answer": "Split into chunks, summarize sections, combine summaries hierarchically, track citations, and avoid sending the whole PDF if it exceeds context limits."}, {"id": "C04Q12", "category": "Candidate Set 04", "question": "[Scenario] A classifier has high accuracy but misses rare harmful cases. What metric matters?", "answer": "Recall for the harmful class is critical. Also inspect precision, F1, PR-AUC, confusion matrix, and threshold behavior."}, {"id": "C04Q13", "category": "Candidate Set 04", "question": "[Practical] What belongs in an AI model card or system card?", "answer": "Purpose, intended users, limitations, training/evaluation data summary, metrics, risks, safety measures, monitoring, and responsible-use guidance."}, {"id": "C04Q14", "category": "Candidate Set 04", "question": "[Practical] How do you compare two prompt versions fairly?", "answer": "Use the same model, same inputs, same retrieval context, same scoring rubric, and blind human or automated evaluation where possible."}, {"id": "C04Q15", "category": "Candidate Set 04", "question": "[Practical] What is a good fallback when an AI service is unavailable?", "answer": "Show a friendly error, retry safely, use cached content if valid, route to a simpler model, queue the request, or escalate to human support."}, {"id": "C04Q16", "category": "Candidate Set 04", "question": "[Practical] How do you control access to AI tools inside an agent?", "answer": "Scope tools by user role, require explicit permissions, validate arguments, log calls, and block tools unrelated to the current task."}, {"id": "C04Q17", "category": "Candidate Set 04", "question": "[Interview] How would you answer ?How do you deploy an LLM app??", "answer": "Describe API integration, prompt/config management, retrieval if needed, testing, monitoring, security, cost controls, and rollback."}, {"id": "C04Q18", "category": "Candidate Set 04", "question": "[Interview] How do you present model evaluation results to business users?", "answer": "Use simple metrics, examples of successes/failures, risk level, cost/latency impact, and a recommendation tied to business goals."}, {"id": "C04Q19", "category": "Candidate Set 04", "question": "[Advanced] How do you prevent prompt injection in RAG systems?", "answer": "Separate instructions from retrieved content, treat documents as untrusted, restrict tool permissions, filter inputs, validate outputs, and monitor attacks."}, {"id": "C04Q20", "category": "Candidate Set 04", "question": "[Advanced] What makes AI governance scalable across teams?", "answer": "Reusable policies, approved templates, central logging, review checklists, model registry, automated evaluations, ownership rules, and training for teams."}, {"id": "C05Q01", "category": "Candidate Set 05", "question": "[Theoretical] What is responsible AI?", "answer": "Responsible AI means designing and operating AI systems with attention to fairness, privacy, transparency, safety, accountability, and human impact."}, {"id": "C05Q02", "category": "Candidate Set 05", "question": "[Theoretical] What is multimodal AI?", "answer": "Multimodal AI can process or generate more than one type of data, such as text, images, audio, video, or documents with layout."}, {"id": "C05Q03", "category": "Candidate Set 05", "question": "[Coding] When should you use OCR before sending an image or PDF to a model?", "answer": "Use OCR when text extraction quality matters, when the model cannot reliably read the document, or when you need searchable text, citations, or downstream validation."}, {"id": "C05Q04", "category": "Candidate Set 05", "question": "[Coding] What is the difference between client-side and server-side validation for AI inputs?", "answer": "Client-side validation improves user experience quickly. Server-side validation is required for security because client checks can be bypassed."}, {"id": "C05Q05", "category": "Candidate Set 05", "question": "[Coding] When should you store conversation history, and when should you summarize it?", "answer": "Store recent turns when exact context matters. Summarize older history when conversations grow long, costs rise, or context window pressure appears."}, {"id": "C05Q06", "category": "Candidate Set 05", "question": "[Coding] Which is better for generated structured data: regex parsing or JSON schema validation?", "answer": "Use JSON schema validation when possible because it is explicit and reliable. Regex parsing is fragile and better suited for small, simple text patterns."}, {"id": "C05Q07", "category": "Candidate Set 05", "question": "[Scenario] A model gives biased recommendations. What steps do you take?", "answer": "Inspect training/evaluation data, define fairness metrics, test across groups, add review, adjust data or prompts, and monitor outcomes after release."}, {"id": "C05Q08", "category": "Candidate Set 05", "question": "[Scenario] A user uploads a blurry image and asks for a confident diagnosis. What should the system do?", "answer": "It should avoid high-confidence claims, explain limitations, ask for a clearer image or professional review, and follow safety policy."}, {"id": "C05Q09", "category": "Candidate Set 05", "question": "[Scenario] An AI copilot suggests code with a security flaw. How do you reduce this risk?", "answer": "Add secure coding checks, dependency scanning, code review, sandboxed execution, policy prompts, and tests for common vulnerabilities."}, {"id": "C05Q10", "category": "Candidate Set 05", "question": "[Scenario] A business wants to replace human reviewers completely. What concerns do you raise?", "answer": "Discuss error risk, accountability, edge cases, compliance, user trust, escalation needs, and whether the task is high-impact enough to require human oversight."}, {"id": "C05Q11", "category": "Candidate Set 05", "question": "[Scenario] A model?s answer is correct but too technical for customers. What adjustment helps?", "answer": "Add audience and tone instructions, examples, readability targets, and evaluation for clarity while preserving factual grounding."}, {"id": "C05Q12", "category": "Candidate Set 05", "question": "[Scenario] A tool-calling agent updates the wrong ticket. What controls are needed?", "answer": "Confirm target identifiers, validate tool arguments, show previews for destructive actions, log changes, and require confirmation for high-impact updates."}, {"id": "C05Q13", "category": "Candidate Set 05", "question": "[Practical] How do you identify high-risk AI use cases?", "answer": "Look for impact on rights, money, health, employment, privacy, safety, legal compliance, or irreversible decisions."}, {"id": "C05Q14", "category": "Candidate Set 05", "question": "[Practical] What should human review focus on in AI workflows?", "answer": "Review factual claims, sensitive decisions, policy compliance, tone, source citations, and cases where model confidence or evidence is weak."}, {"id": "C05Q15", "category": "Candidate Set 05", "question": "[Practical] How do you write useful AI acceptance criteria?", "answer": "Specify expected behavior, refusal behavior, source requirements, accuracy threshold, latency target, supported inputs, and known out-of-scope cases."}, {"id": "C05Q16", "category": "Candidate Set 05", "question": "[Practical] How do you choose a model for a business application?", "answer": "Compare quality, latency, cost, context length, tool support, safety, data policy, deployment options, and maintainability."}, {"id": "C05Q17", "category": "Candidate Set 05", "question": "[Interview] How would you explain responsible AI without sounding abstract?", "answer": "Use concrete examples: avoid biased outputs, protect private data, explain limitations, monitor failures, and keep humans involved for risky decisions."}, {"id": "C05Q18", "category": "Candidate Set 05", "question": "[Interview] How do you answer ?What AI use case would you build first for a company??", "answer": "Choose a low-risk, high-value workflow with available data, clear success metrics, human review, and measurable time savings."}, {"id": "C05Q19", "category": "Candidate Set 05", "question": "[Advanced] What are the risks of multimodal AI in production?", "answer": "Risks include misreading images, privacy leakage, inaccessible outputs, high cost, latency, unsafe visual interpretations, and difficulty evaluating quality."}, {"id": "C05Q20", "category": "Candidate Set 05", "question": "[Advanced] How do you balance automation and human control in business AI?", "answer": "Automate repetitive low-risk steps, keep humans in review for high-impact decisions, provide explanations, log actions, and make overrides easy."}];
const ORDER=["Candidate Set 01", "Candidate Set 02", "Candidate Set 03", "Candidate Set 04", "Candidate Set 05"];
function render(f=""){
const app=document.getElementById("app");app.innerHTML="";
ORDER.forEach(cat=>{
const items=DATA.filter(x=>(x.category||"Other")==cat&&((x.question||"").toLowerCase().includes(f)||cat.toLowerCase().includes(f)));
if(!items.length)return;
const card=document.createElement("div");card.className="card";
const head=document.createElement("div");head.className="head";
head.innerHTML=cat+" <span class='count'>"+items.length+"</span>";
const list=document.createElement("div");list.className="list";
head.onclick=()=>list.style.display=list.style.display==="block"?"none":"block";
items.forEach(it=>{
const q=document.createElement("div");q.className="q";q.textContent="❓ "+it.question;
const a=document.createElement("div");a.className="a";
let h="<div class='tag'>Answer</div><div>"+(it.answer||"")+"</div>";
if(it.check)h+="<div class='tag'>Check</div><div>"+it.check+"</div>";
a.innerHTML=h;
q.onclick=()=>a.style.display=a.style.display==="block"?"none":"block";
list.appendChild(q);list.appendChild(a);
});
card.appendChild(head);card.appendChild(list);app.appendChild(card);
});
}
