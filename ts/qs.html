const data=[{"id": "1", "category": "Fundamentals", "question": "What is Generative AI?", "answer": "AI that creates new content such as text, images, code, audio, and video by learning patterns from data."}, {"id": "2", "category": "Fundamentals", "question": "How is Generative AI different from Traditional AI?", "answer": "Traditional AI predicts or classifies; Generative AI creates new content."}, {"id": "3", "category": "Fundamentals", "question": "What is an LLM?", "answer": "A Large Language Model is a transformer-based neural network trained on massive text datasets to predict the next token."}, {"id": "4", "category": "Fundamentals", "question": "What is a token?", "answer": "The smallest unit of text processed by an LLM (word, subword, or character)."}, {"id": "5", "category": "Fundamentals", "question": "What are model parameters?", "answer": "Learnable weights that store the model's knowledge."}, {"id": "6", "category": "Fundamentals", "question": "What are embeddings?", "answer": "Dense vector representations capturing semantic meaning of text."}, {"id": "7", "category": "Fundamentals", "question": "What is tokenization?", "answer": "Converting text into tokens before model processing."}, {"id": "8", "category": "Fundamentals", "question": "What is context window?", "answer": "Maximum number of tokens a model can process in one request."}, {"id": "9", "category": "Fundamentals", "question": "What is a Transformer?", "answer": "A deep learning architecture using self-attention for efficient sequence processing."}, {"id": "10", "category": "Fundamentals", "question": "Why did Transformers replace RNNs?", "answer": "Better parallelization, long-context handling, and faster training."}, {"id": "11", "category": "Transformer", "question": "What is Self-Attention?", "answer": "Mechanism allowing each token to focus on relevant tokens in the input."}, {"id": "12", "category": "Transformer", "question": "What is Multi-Head Attention?", "answer": "Multiple attention mechanisms learning different relationships simultaneously."}, {"id": "13", "category": "Transformer", "question": "What is Positional Encoding?", "answer": "Information added to embeddings so the model understands token order."}, {"id": "14", "category": "Transformer", "question": "What is an Encoder?", "answer": "Transformer component that converts input into contextual representations."}, {"id": "15", "category": "Transformer", "question": "What is a Decoder?", "answer": "Component that generates output tokens sequentially."}, {"id": "16", "category": "Prompt Engineering", "question": "What is Prompt Engineering?", "answer": "Designing prompts to obtain accurate and relevant model outputs."}, {"id": "17", "category": "Prompt Engineering", "question": "What is Zero-shot prompting?", "answer": "Asking the model without providing examples."}, {"id": "18", "category": "Prompt Engineering", "question": "What is Few-shot prompting?", "answer": "Providing a few examples before asking the task."}, {"id": "19", "category": "Prompt Engineering", "question": "What is Chain-of-Thought prompting?", "answer": "Encouraging step-by-step reasoning before answering."}, {"id": "20", "category": "Prompt Engineering", "question": "What is Role Prompting?", "answer": "Assigning a role like You are a Data Scientist to guide responses."}, {"id": "21", "category": "LLM Concepts", "question": "What is Temperature?", "answer": "Controls randomness in generated responses."}, {"id": "22", "category": "LLM Concepts", "question": "What is Top-k Sampling?", "answer": "Chooses the next token from the top K probable tokens."}, {"id": "23", "category": "LLM Concepts", "question": "What is Top-p Sampling?", "answer": "Chooses from the smallest set of tokens whose cumulative probability exceeds P."}, {"id": "24", "category": "LLM Concepts", "question": "What are Hallucinations?", "answer": "Confident but incorrect or fabricated model outputs."}, {"id": "25", "category": "LLM Concepts", "question": "How can hallucinations be reduced?", "answer": "RAG, better prompts, fine-tuning, validation, and human review."}, {"id": "26", "category": "Fine-tuning", "question": "What is Fine-tuning?", "answer": "Further training a pretrained model on domain-specific data."}, {"id": "27", "category": "Fine-tuning", "question": "When should you use Fine-tuning?", "answer": "When consistent domain knowledge or behavior is required."}, {"id": "28", "category": "RAG", "question": "What is RAG?", "answer": "Retrieval-Augmented Generation combines document retrieval with LLM generation."}, {"id": "29", "category": "RAG", "question": "Why use RAG?", "answer": "To provide current, factual, and organization-specific information."}, {"id": "30", "category": "RAG", "question": "What is Chunking?", "answer": "Splitting large documents into smaller sections before embedding."}, {"id": "31", "category": "Vector Search", "question": "What is a Vector Database?", "answer": "A database optimized for storing and searching embeddings."}, {"id": "32", "category": "Vector Search", "question": "Why not use SQL for semantic search?", "answer": "SQL performs exact matching; vector databases perform similarity search."}, {"id": "33", "category": "Vector Search", "question": "Name popular vector databases.", "answer": "Pinecone, FAISS, Chroma, Milvus, Weaviate, Qdrant."}, {"id": "34", "category": "Agents", "question": "What is an AI Agent?", "answer": "An LLM that can reason, plan, use tools, and perform tasks autonomously."}, {"id": "35", "category": "Agents", "question": "What is Function Calling?", "answer": "Allowing an LLM to invoke external APIs or tools."}, {"id": "36", "category": "Agents", "question": "What is MCP?", "answer": "Model Context Protocol standardizes communication between LLMs and external tools."}, {"id": "37", "category": "Image Models", "question": "What is a Diffusion Model?", "answer": "A model that generates images by progressively removing noise."}, {"id": "38", "category": "Image Models", "question": "Name popular diffusion models.", "answer": "Stable Diffusion, DALL·E, Imagen."}, {"id": "39", "category": "Alignment", "question": "What is RLHF?", "answer": "Reinforcement Learning from Human Feedback aligns models with human preferences."}, {"id": "40", "category": "Alignment", "question": "Why is RLHF important?", "answer": "It improves helpfulness, safety, and response quality."}, {"id": "41", "category": "Enterprise AI", "question": "What is Prompt Injection?", "answer": "A malicious prompt attempting to override system instructions."}, {"id": "42", "category": "Enterprise AI", "question": "How do you prevent Prompt Injection?", "answer": "Input validation, guardrails, filtering, and access controls."}, {"id": "43", "category": "Enterprise AI", "question": "What are Guardrails?", "answer": "Rules and policies that ensure safe and compliant AI responses."}, {"id": "44", "category": "Enterprise AI", "question": "What is AI Safety?", "answer": "Practices to ensure AI systems are secure, ethical, and reliable."}, {"id": "45", "category": "Enterprise AI", "question": "What are common GenAI applications?", "answer": "Chatbots, summarization, code generation, document search, content creation, translation."}, {"id": "46", "category": "Evaluation", "question": "How do you evaluate an LLM?", "answer": "Accuracy, relevance, latency, hallucination rate, human feedback, and cost."}, {"id": "47", "category": "Deployment", "question": "What are challenges in deploying LLMs?", "answer": "Cost, latency, scalability, security, monitoring, and hallucinations."}, {"id": "48", "category": "Optimization", "question": "How can LLM inference cost be reduced?", "answer": "Quantization, caching, prompt optimization, batching, and smaller models."}, {"id": "49", "category": "Ethics", "question": "How do you reduce bias in GenAI?", "answer": "Diverse datasets, bias testing, human review, and fairness monitoring."}, {"id": "50", "category": "Future Trends", "question": "What are future trends in Generative AI?", "answer": "Multimodal AI, autonomous agents, smaller efficient models, on-device AI, and enterprise AI copilots."}, {"id": "1", "category": "LLM", "question": "Your chatbot gives different answers to the same question every time. What would you check first?", "answer": "Verify temperature, prompt consistency, model version, and conversation history."}, {"id": "2", "category": "LLM", "question": "A user asks about today's stock price, but the chatbot gives outdated information. How would you fix it?", "answer": "Use web search or RAG with live data instead of relying solely on the LLM."}, {"id": "3", "category": "LLM", "question": "Users complain the chatbot is too slow. What optimization would you apply?", "answer": "Use a smaller model, caching, streaming, and prompt optimization."}, {"id": "4", "category": "LLM", "question": "A healthcare chatbot provides medical advice with high confidence. What safeguard would you add?", "answer": "Add disclaimers, human review, and restrict responses to verified medical knowledge."}, {"id": "5", "category": "LLM", "question": "A customer asks the chatbot to answer in French instead of English. How would the LLM handle this?", "answer": "Modern multilingual LLMs can respond in multiple languages without retraining."}, {"id": "6", "category": "LLM", "question": "Your chatbot becomes expensive to operate. What would you optimize first?", "answer": "Reduce token usage, cache responses, and choose a smaller model where appropriate."}, {"id": "7", "category": "LLM", "question": "Your company wants a coding assistant instead of a general chatbot. Which model would you choose?", "answer": "A code-specialized LLM such as Codex, Code Llama, or DeepSeek Coder."}, {"id": "8", "category": "LLM", "question": "Two users ask the same question but receive different answers due to conversation history. Why?", "answer": "Previous conversation (context) influences the response."}, {"id": "1", "category": "Prompt Engineering", "question": "A chatbot gives inconsistent answers for the same query. What would you check first?", "answer": "Check the prompt, temperature, model version, and conversation history."}, {"id": "2", "category": "Prompt Engineering", "question": "A user says the model ignores instructions about format. How do you fix it?", "answer": "Make the output format explicit, add examples, and enforce schema validation."}, {"id": "3", "category": "Prompt Engineering", "question": "Your assistant writes too much detail for a simple FAQ. What would you change?", "answer": "Tighten the prompt with brevity constraints and output length limits."}, {"id": "4", "category": "Prompt Engineering", "question": "A model keeps misunderstanding business context. What would help most?", "answer": "Add domain context, role instructions, and few-shot examples."}, {"id": "5", "category": "Prompt Engineering", "question": "You need only JSON output from the model. How do you ensure that?", "answer": "Use a strict JSON schema, format instructions, and response validation."}, {"id": "6", "category": "Prompt Engineering", "question": "A customer support bot sounds too generic. How do you make it sound on-brand?", "answer": "Add brand voice rules, tone examples, and prohibited phrases in the prompt."}, {"id": "7", "category": "Prompt Engineering", "question": "The model answers confidently but misses key details. What prompt change helps?", "answer": "Ask it to reason step-by-step or to verify against provided context."}, {"id": "8", "category": "Prompt Engineering", "question": "A long prompt is hurting accuracy. What would you do?", "answer": "Remove redundancy, prioritize key instructions, and shorten context."}, {"id": "9", "category": "Prompt Engineering", "question": "Users ask complex questions in multiple steps. How should the prompt be designed?", "answer": "Break the task into explicit steps with clear intermediate output expectations."}, {"id": "10", "category": "Prompt Engineering", "question": "The assistant should refuse unsafe requests. How do you build that behavior?", "answer": "Add safety rules, refusal criteria, and escalation instructions in the system prompt."}, {"id": "11", "category": "LLM Basics", "question": "A stakeholder asks why the model sometimes makes up facts. How do you explain it?", "answer": "The model predicts likely text, not verified truth, so it can hallucinate."}, {"id": "12", "category": "LLM Basics", "question": "Why is the same answer sometimes different across runs?", "answer": "Sampling randomness and decoding settings can change the output."}, {"id": "13", "category": "LLM Basics", "question": "Your application must be deterministic. What setting matters most?", "answer": "Set temperature close to zero and keep prompts stable."}, {"id": "14", "category": "LLM Basics", "question": "A request exceeds the model limit. What happens?", "answer": "The input is truncated or rejected because it exceeds the context window."}, {"id": "15", "category": "LLM Basics", "question": "Why does token count matter in production?", "answer": "It directly affects cost, latency, and context capacity."}, {"id": "16", "category": "Transformers", "question": "A model struggles with long-range dependencies in text. What architecture helps?", "answer": "A transformer with self-attention handles long-range dependencies better."}, {"id": "17", "category": "Transformers", "question": "Why does the model need positional information?", "answer": "To understand token order, since attention alone is order-agnostic."}, {"id": "18", "category": "Transformers", "question": "A candidate says attention is “just weights.” What is the better answer?", "answer": "Attention scores relevance between tokens and builds context-aware representations."}, {"id": "19", "category": "Embeddings", "question": "Two similar queries are not returning similar results. What would you inspect?", "answer": "Check embedding model quality, chunking strategy, and vector search settings."}, {"id": "20", "category": "Embeddings", "question": "Why would embeddings be used for semantic search?", "answer": "They capture meaning, not just exact keywords."}, {"id": "21", "category": "RAG", "question": "An HR chatbot returns outdated policy answers. How do you fix it without retraining the model?", "answer": "Update the source documents and re-index the embeddings in the vector store."}, {"id": "22", "category": "RAG", "question": "The chatbot answers correctly sometimes but misses relevant policy text. What is likely wrong?", "answer": "The retrieval layer is failing due to poor chunking or weak top-k selection."}, {"id": "23", "category": "RAG", "question": "Large documents are producing poor search results. What would you change?", "answer": "Improve chunk size, overlap, and metadata tagging."}, {"id": "24", "category": "RAG", "question": "A user asks for a policy answer, but no relevant document is found. What should the system do?", "answer": "Say it cannot find evidence and escalate or ask for more details."}, {"id": "25", "category": "RAG", "question": "You need the answer to include source references. How do you design it?", "answer": "Return retrieved document metadata and citations with the generated response."}, {"id": "26", "category": "RAG", "question": "The model hallucinates even when documents are available. What would reduce this?", "answer": "Ground the prompt with retrieved context and lower the temperature."}, {"id": "27", "category": "RAG", "question": "Search returns good docs, but the final answer is weak. Where is the issue?", "answer": "The generation prompt or answer synthesis step needs improvement."}, {"id": "28", "category": "Vector Database", "question": "Why is SQL not enough for semantic document search?", "answer": "SQL is exact-match oriented, while vector search finds meaning-based similarity."}, {"id": "29", "category": "Vector Database", "question": "What would you store besides embeddings?", "answer": "Source, timestamp, document ID, access scope, and page number."}, {"id": "30", "category": "Vector Database", "question": "A search result shows restricted documents to the wrong user. What is missing?", "answer": "Access control filtering at retrieval time."}, {"id": "31", "category": "Fine-tuning", "question": "A company wants the model to follow a specific domain tone. When would fine-tuning help?", "answer": "When the behavior must be consistent across many prompts."}, {"id": "32", "category": "Fine-tuning", "question": "A model lacks up-to-date company policy. Should you fine-tune it?", "answer": "No, use RAG because policy changes more often than model retraining."}, {"id": "33", "category": "Fine-tuning", "question": "The model keeps formatting outputs incorrectly. What is the best fix?", "answer": "Fine-tune on examples of the required output format or enforce schema validation."}, {"id": "34", "category": "RLHF", "question": "The model is technically correct but unhelpful. What training method improves that?", "answer": "RLHF aligns outputs with human preferences for helpfulness and safety."}, {"id": "35", "category": "RLHF", "question": "Why is human feedback useful in model alignment?", "answer": "It teaches the model which responses people prefer, not just which are probable."}, {"id": "36", "category": "Agents", "question": "A system must book travel, send email, and update a ticket. What approach fits best?", "answer": "Use an agent with tool calling and workflow control."}, {"id": "37", "category": "Agents", "question": "The assistant needs to choose between several APIs based on user intent. What should you add?", "answer": "Intent routing and function calling."}, {"id": "38", "category": "Agents", "question": "An agent loops endlessly on the same task. How do you prevent that?", "answer": "Add step limits, stop conditions, and execution checkpoints."}, {"id": "39", "category": "Agents", "question": "The assistant needs memory across sessions. What is needed?", "answer": "Persistent memory storage with scoped retrieval."}, {"id": "40", "category": "Function Calling", "question": "The model should fetch live order status from a system. What is the right pattern?", "answer": "The model should call a status API through function calling."}, {"id": "41", "category": "Security", "question": "A user tries to override instructions with “ignore all previous rules.” What is this?", "answer": "Prompt injection."}, {"id": "42", "category": "Security", "question": "How do you protect a chatbot from prompt injection?", "answer": "Use input filtering, system prompt isolation, and output guardrails."}, {"id": "43", "category": "Security", "question": "A chatbot handles confidential PDFs. What must be enforced?", "answer": "Authentication, authorization, encryption, and audit logging."}, {"id": "44", "category": "Governance", "question": "The business wants to know why the model gave a specific answer. What helps?", "answer": "Log prompts, retrieved sources, model version, and output traces."}, {"id": "45", "category": "Evaluation", "question": "The model seems good in demos but weak in production. What should you measure?", "answer": "Accuracy, hallucination rate, latency, cost, and user feedback."}, {"id": "46", "category": "Evaluation", "question": "How do you compare two model versions fairly?", "answer": "Use the same test set, same prompts, and the same evaluation metrics."}, {"id": "47", "category": "Deployment", "question": "The chatbot is too slow under load. What would you optimize first?", "answer": "Cache frequent responses, reduce prompt size, and use a smaller model if possible."}, {"id": "48", "category": "Deployment", "question": "The system cost is too high. What reduces inference cost?", "answer": "Reduce token usage, batch requests, cache results, and choose efficient models."}, {"id": "49", "category": "Multimodal", "question": "A user uploads an image and asks for a description. What model type is needed?", "answer": "A multimodal model that can process both image and text."}, {"id": "50", "category": "Business Use Case", "question": "A sales team wants AI to draft personalized emails from CRM data. What is the safest design?", "answer": "Use retrieval from approved CRM fields, controlled templates, and human review before sending."}, {"id": "1", "category": "AI Basics", "question": "What is Artificial Intelligence?", "answer": "AI enables machines to perform tasks that typically require human intelligence, such as learning, reasoning, and decision-making."}, {"id": "2", "category": "AI Basics", "question": "What is the difference between AI, Machine Learning, and Deep Learning?", "answer": "AI is the broad field, ML is AI that learns from data, and DL is ML using neural networks with many layers."}, {"id": "3", "category": "AI Basics", "question": "Give three real-world AI applications.", "answer": "Chatbots, recommendation systems, fraud detection, autonomous vehicles, image recognition."}, {"id": "4", "category": "AI Basics", "question": "What is supervised learning?", "answer": "Learning from labeled data to predict outputs."}, {"id": "5", "category": "AI Basics", "question": "What is unsupervised learning?", "answer": "Learning patterns from unlabeled data, such as clustering."}, {"id": "6", "category": "AI Basics", "question": "What is reinforcement learning?", "answer": "Learning through trial and error using rewards and penalties."}, {"id": "7", "category": "AI Basics", "question": "What is overfitting?", "answer": "The model memorizes training data and performs poorly on unseen data."}, {"id": "8", "category": "AI Basics", "question": "What is underfitting?", "answer": "The model is too simple to learn the underlying patterns."}, {"id": "9", "category": "AI Basics", "question": "What is a feature?", "answer": "An input variable used by a model for prediction."}, {"id": "10", "category": "AI Basics", "question": "What is a label?", "answer": "The expected output or target value in supervised learning."}, {"id": "11", "category": "Python", "question": "What are Python's main data types?", "answer": "int, float, str, bool, list, tuple, set, and dict."}, {"id": "12", "category": "Python", "question": "What is the difference between a list and a tuple?", "answer": "Lists are mutable; tuples are immutable."}, {"id": "13", "category": "Python", "question": "What is the difference between a list and a set?", "answer": "Lists allow duplicates and preserve order; sets contain unique elements and are unordered."}, {"id": "14", "category": "Python", "question": "What is a dictionary?", "answer": "A collection of key-value pairs with unique keys."}, {"id": "15", "category": "Python", "question": "What is the difference between `==` and `is`?", "answer": "`==` compares values; `is` compares object identity."}, {"id": "16", "category": "Python", "question": "What is list comprehension?", "answer": "A concise way to create lists using a single expression."}, {"id": "17", "category": "Python", "question": "What is a function?", "answer": "A reusable block of code that performs a specific task."}, {"id": "18", "category": "Python", "question": "What is a lambda function?", "answer": "A small anonymous function written using the `lambda` keyword."}, {"id": "19", "category": "Python", "question": "What is exception handling?", "answer": "Handling runtime errors using `try`, `except`, `else`, and `finally`."}, {"id": "20", "category": "Python", "question": "Why do we use virtual environments?", "answer": "To isolate project dependencies and avoid version conflicts."}, {"id": "21", "category": "Python", "question": "What is a Python module?", "answer": "A file containing reusable Python code."}, {"id": "22", "category": "Python", "question": "What is a package?", "answer": "A collection of related Python modules."}, {"id": "23", "category": "Python", "question": "What are NumPy and Pandas used for?", "answer": "NumPy is used for numerical computing; Pandas is used for data analysis and manipulation."}, {"id": "24", "category": "Python", "question": "What is the Global Interpreter Lock (GIL)?", "answer": "A mechanism in CPython that allows only one thread to execute Python bytecode at a time."}, {"id": "25", "category": "Python", "question": "What is the difference between multithreading and multiprocessing?", "answer": "Multithreading shares the same process memory (good for I/O-bound tasks); multiprocessing uses separate processes (better for CPU-bound tasks)."}, {"id": "1", "category": "Python", "question": "How does Python manage memory?", "answer": "Python uses reference counting and a garbage collector to free unused objects.", "check": "Understanding of memory management"}, {"id": "2", "category": "Python", "question": "When would you use multithreading vs multiprocessing?", "answer": "Multithreading for I/O-bound tasks; multiprocessing for CPU-bound tasks because of the GIL.", "check": "Performance knowledge"}, {"id": "3", "category": "Python", "question": "How would you optimize a Python program processing millions of records?", "answer": "Use generators, vectorization (Pandas/NumPy), multiprocessing, chunking, and efficient algorithms.", "check": "Performance optimization"}, {"id": "4", "category": "Python", "question": "A Python application is consuming excessive memory. How would you debug it?", "answer": "Use memory profilers, identify large objects, release references, and process data in chunks.", "check": "Troubleshooting skills"}, {"id": "5", "category": "Python", "question": "Explain generators and when you would use them.", "answer": "Generators yield values lazily, reducing memory usage for large datasets.", "check": "Practical Python knowledge"}, {"id": "6", "category": "Python", "question": "What's the difference between deep copy and shallow copy?", "answer": "Shallow copy shares nested objects; deep copy recursively copies all objects.", "check": " const categories=[...new Set(data.map(x=>x.category||"Other"))].sort();

const catDiv=document.getElementById("cats");
categories.forEach(c=>{
 let d=document.createElement("div");
 d.className="item";
 d.textContent=c;
 d.onclick=()=>showQuestions(c,d);
 catDiv.appendChild(d);
});

function showQuestions(cat,el){
 document.querySelectorAll("#cats .item").forEach(i=>i.classList.remove("active"));
 el.classList.add("active");
 const qDiv=document.getElementById("qs");
 qDiv.innerHTML="<h3>Questions</h3>";
 data.filter(x=>(x.category||"Other")==cat).forEach(q=>{
   let d=document.createElement("div");
   d.className="item";
   d.textContent=q.question;
   d.onclick=()=>showAnswer(q,d);
   qDiv.appendChild(d);
 });
 document.getElementById("details").innerHTML="Select a question.";
}

function showAnswer(q,el){
 document.querySelectorAll("#qs .item").forEach(i=>i.classList.remove("active"));
 el.classList.add("active");
 let h=`<h2>${q.question}</h2>
 <div class='badge'>Answer</div><pre>${q.answer||""}</pre>`;
 if(q.check) h+=`<div class='badge'>Check</div><pre>${q.check}</pre>`;
 if(q.skill_checked) h+=`<div class='badge'>Skill Checked</div><pre>${q.skill_checked}</pre>`;
 if(q.difficulty) h+=`<div class='badge'>Difficulty</div><pre>${q.difficulty}</pre>`;
 document.getElementById("details").innerHTML=h;
}
</script>
