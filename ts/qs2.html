"Few-shot prompting provides a small set of examples before the actual request, helping the model follow the desired pattern, tone, or format."}, {"id": "19", "category": "Prompt Engineering", "question": "What is Chain-of-Thought prompting?", "answer": "Encouraging step-by-step reasoning before answering."}, {"id": "20", "category": "Prompt Engineering", "question": "What is Role Prompting?", "answer": "Assigning a role like You are a Data Scientist to guide responses."}, {"id": "21", "category": "LLM Concepts", "question": "What is Temperature?", "answer": "Temperature controls randomness during generation. Lower values make answers more consistent; higher values make outputs more creative but less predictable."}, {"id": "22", "category": "LLM Concepts", "question": "What is Top-k Sampling?", "answer": "Chooses the next token from the top K probable tokens."}, {"id": "23", "category": "LLM Concepts", "question": "What is Top-p Sampling?", "answer": "Chooses from the smallest set of tokens whose cumulative probability exceeds P."}, {"id": "24", "category": "LLM Concepts", "question": "What are Hallucinations?", "answer": "Hallucinations are confident but incorrect, unsupported, or fabricated outputs. They happen because the model predicts plausible text rather than verifying truth by default."}, {"id": "25", "category": "LLM Concepts", "question": "How can hallucinations be reduced?", "answer": "Reduce hallucinations by grounding answers with trusted context, using RAG, lowering temperature, validating outputs, adding citations, and escalating uncertain cases."}, {"id": "26", "category": "Fine-tuning", "question": "What is Fine-tuning?", "answer": "Fine-tuning continues training a pretrained model on task-specific examples so it better follows a domain, format, tone, or behavior."}, {"id": "27", "category": "Fine-tuning", "question": "When should you use Fine-tuning?", "answer": "Use fine-tuning when you need consistent behavior, style, or formatting across many requests. Use RAG instead when the issue is missing or changing knowledge."}, {"id": "28", "category": "RAG", "question": "What is RAG?", "answer": "Retrieval-Augmented Generation retrieves relevant external documents first, then gives that context to the LLM so answers are more grounded and up to date."}, {"id": "29", "category": "RAG", "question": "Why use RAG?", "answer": "Use RAG when answers must rely on current, private, or organization-specific knowledge without retraining the model every time the source content changes."}, {"id": "30", "category": "RAG", "question": "What is Chunking?", "answer": "Chunking splits large documents into smaller, meaningful sections so they can be embedded, searched, and passed into the model within context limits."}, {"id": "31", "category": "Vector Search", "question": "What is a Vector Database?", "answer": "A vector database stores embeddings and supports similarity search, helping applications find content by meaning rather than exact keyword match."}, {"id": "32", "category": "Vector Search", "question": "Why not use SQL for semantic search?", "answer": "SQL performs exact matching; vector databases perform similarity search."}, {"id": "33", "category": "Vector Search", "question": "Name popular vector databases.", "answer": "Pinecone, FAISS, Chroma, Milvus, Weaviate, Qdrant."}, {"id": "34", "category": "Agents", "question": "What is an AI Agent?", "answer": "An LLM that can reason, plan, use tools, and perform tasks autonomously."}, {"id": "35", "category": "Agents", "question": "What is Function Calling?", "answer": "Function calling lets the model request external tools or APIs with structured arguments, making it useful for live data, calculations, workflows, and integrations."}, {"id": "36", "category": "Agents", "question": "What is MCP?", "answer": "MCP, or Model Context Protocol, is a standard way for AI apps to connect models with external tools, data sources, and services."}, {"id": "37", "category": "Image Models", "question": "What is a Diffusion Model?", "answer": "A model that generates images by progressively removing noise."}, {"id": "38", "category": "Image Models", "question": "Name popular diffusion models.", "answer": "Stable Diffusion, DALL·E, Imagen."}, {"id": "39", "category": "Alignment", "question": "What is RLHF?", "answer": "Reinforcement Learning from Human Feedback aligns models with human preferences."}, {"id": "40", "category": "Alignment", "question": "Why is RLHF important?", "answer": "It improves helpfulness, safety, and response quality."}, {"id": "41", "category": "Enterprise AI", "question": "What is Prompt Injection?", "answer": "A malicious prompt attempting to override system instructions."}, {"id": "42", "category": "Enterprise AI", "question": "How do you prevent Prompt Injection?", "answer": "Prevent prompt injection with instruction hierarchy, input filtering, tool permission checks, retrieval access controls, output validation, and monitoring."}, {"id": "43", "category": "Enterprise AI", "question": "What are Guardrails?", "answer": "Guardrails are rules, checks, and controls that keep AI outputs safe, compliant, on-topic, and aligned with application requirements."}, {"id": "44", "category": "Enterprise AI", "question": "What is AI Safety?", "answer": "AI safety focuses on building systems that are reliable, secure, fair, transparent, and unlikely to cause harm in real-world use."}, {"id": "45", "category": "Enterprise AI", "question": "What are common GenAI applications?", "answer": "Chatbots, summarization, code generation, document search, content creation, translation."}, {"id": "46", "category": "Evaluation", "question": "How do you evaluate an LLM?", "answer": "Accuracy, relevance, latency, hallucination rate, human feedback, and cost."}, {"id": "47", "category": "Deployment", "question": "What are challenges in deploying LLMs?", "answer": "Cost, latency, scalability, security, monitoring, and hallucinations."}, {"id": "48", "category": "Optimization", "question": "How can LLM inference cost be reduced?", "answer": "Quantization, caching, prompt optimization, batching, and smaller models."}, {"id": "49", "category": "Ethics", "question": "How do you reduce bias in GenAI?", "answer": "Diverse datasets, bias testing, human review, and fairness monitoring."}, {"id": "50", "category": "Future Trends", "question": "What are future trends in Generative AI?", "answer": "Multimodal AI, autonomous agents, smaller efficient models, on-device AI, and enterprise AI copilots."}, {"id": "1", "category": "LLM", "question": "Your chatbot gives different answers to the same question every time. What would you check first?", "answer": "First confirm the prompt is identical, then check temperature/sampling settings, model version, system instructions, and any conversation history that may change the response."}, {"id": "2", "category": "LLM", "question": "A user asks about today's stock price, but the chatbot gives outdated information. How would you fix it?", "answer": "Use web search or RAG with live data instead of relying solely on the LLM."}, {"id": "3", "category": "LLM", "question": "Users complain the chatbot is too slow. What optimization would you apply?", "answer": "Use a smaller model, caching, streaming, and prompt optimization."}, {"id": "4", "category": "LLM", "question": "A healthcare chatbot provides medical advice with high confidence. What safeguard would you add?", "answer": "Add disclaimers, human review, and restrict responses to verified medical knowledge."}, {"id": "5", "category": "LLM", "question": "A customer asks the chatbot to answer in French instead of English. How would the LLM handle this?", "answer": "Modern multilingual LLMs can respond in multiple languages without retraining."}, {"id": "6", "category": "LLM", "question": "Your chatbot becomes expensive to operate. What would you optimize first?", "answer": "Reduce token usage, cache responses, and choose a smaller model where appropriate."}, {"id": "7", "category": "LLM", "question": "Your company wants a coding assistant instead of a general chatbot. Which model would you choose?", "answer": "A code-specialized LLM such as Codex, Code Llama, or DeepSeek Coder."}, {"id": "8", "category": "LLM", "question": "Two users ask the same question but receive different answers due to conversation history. Why?", "answer": "Previous conversation (context) influences the response."}, {"id": "2", "category": "Prompt Engineering", "question": "A user says the model ignores instructions about format. How do you fix it?", "answer": "Make the output format explicit, add examples, and enforce schema validation."}, {"id": "3", "category": "Prompt Engineering", "question": "Your assistant writes too much detail for a simple FAQ. What would you change?", "answer": "Tighten the prompt with brevity constraints and output length limits."}, {"id": "4", "category": "Prompt Engineering", "question": "A model keeps misunderstanding business context. What would help most?", "answer": "Add domain context, role instructions, and few-shot examples."}, {"id": "5", "category": "Prompt Engineering", "question": "You need only JSON output from the model. How do you ensure that?", "answer": "Use a strict JSON schema, format instructions, and response validation."}, {"id": "6", "category": "Prompt Engineering", "question": "A customer support bot sounds too generic. How do you make it sound on-brand?", "answer": "Add brand voice rules, tone examples, and prohibited phrases in the prompt."}, {"id": "7", "category": "Prompt Engineering", "question": "The model answers confidently but misses key details. What prompt change helps?", "answer": "Ask it to reason step-by-step or to verify against provided context."}, {"id": "8", "category": "Prompt Engineering", "question": "A long prompt is hurting accuracy. What would you do?", "answer": "Remove redundancy, prioritize key instructions, and shorten context."}, {"id": "9", "category": "Prompt Engineering", "question": "Users ask complex questions in multiple steps. How should the prompt be designed?", "answer": "Break the task into explicit steps with clear intermediate output expectations."}, {"id": "10", "category": "Prompt Engineering", "question": "The assistant should refuse unsafe requests. How do you build that behavior?", "answer": "Add safety rules, refusal criteria, and escalation instructions in the system prompt."}, {"id": "11", "category": "LLM Basics", "question": "A stakeholder asks why the model sometimes makes up facts. How do you explain it?", "answer": "The model predicts likely text, not verified truth, so it can hallucinate."}, {"id": "12", "category": "LLM Basics", "question": "Why is the same answer sometimes different across runs?", "answer": "LLMs often sample from multiple likely next tokens. Temperature, top-p/top-k, model updates, and conversation context can all change the final answer."}, {"id": "13", "category": "LLM Basics", "question": "Your application must be deterministic. What setting matters most?", "answer": "Set temperature near zero, keep the prompt and context identical, pin the model version where possible, and avoid hidden state changes."}, {"id": "14", "category": "LLM Basics", "question": "A request exceeds the model limit. What happens?", "answer": "The input is truncated or rejected because it exceeds the context window."}, {"id": "15", "category": "LLM Basics", "question": "Why does token count matter in production?", "answer": "Token count affects cost, latency, context capacity, and rate limits, so shorter prompts and responses usually make production systems faster and cheaper."}, {"id": "16", "category": "Transformers", "question": "A model struggles with long-range dependencies in text. What architecture helps?", "answer": "A transformer with self-attention handles long-range dependencies better."}, {"id": "17", "category": "Transformers", "question": "Why does the model need positional information?", "answer": "To understand token order, since attention alone is order-agnostic."}, {"id": "18", "category": "Transformers", "question": "A candidate says attention is “just weights.” What is the better answer?", "answer": "Attention assigns relevance scores between tokens, then uses those scores to build context-aware representations that capture relationships like references and dependencies."}, {"id": "19", "category": "Embeddings", "question": "Two similar queries are not returning similar results. What would you inspect?", "answer": "Check embedding model quality, chunking strategy, and vector search settings."}, {"id": "20", "category": "Embeddings", "question": "Why would embeddings be used for semantic search?", "answer": "Embeddings capture meaning, so semantic search can find conceptually related content even when the exact keywords are different."}, {"id": "21", "category": "RAG", "question": "An HR chatbot returns outdated policy answers. How do you fix it without retraining the model?", "answer": "Update the source documents and re-index the embeddings in the vector store."}, {"id": "22", "category": "RAG", "question": "The chatbot answers correctly sometimes but misses relevant policy text. What is likely wrong?", "answer": "The retrieval layer is failing due to poor chunking or weak top-k selection."}, {"id": "23", "category": "RAG", "question": "Large documents are producing poor search results. What would you change?", "answer": "Improve chunk size, overlap, and metadata tagging."}, {"id": "24", "category": "RAG", "question": "A user asks for a policy answer, but no relevant document is found. What should the system do?", "answer": "Say it cannot find evidence and escalate or ask for more details."}, {"id": "25", "category": "RAG", "question": "You need the answer to include source references. How do you design it?", "answer": "Return retrieved document metadata and citations with the generated response."}, {"id": "26", "category": "RAG" ."}, {"id": "6", "category": "AI Basics", "question": "What is reinforcement learning?", "answer": "Learning through trial and error using rewards and penalties."}, {"id": "7", "category": "AI Basics", "question": "What is overfitting?", "answer": "The model memorizes training data and performs poorly on unseen data."}, {"id": "8", "category": "AI Basics", "question": "What is underfitting?", "answer": "The model is too simple to learn the underlying patterns."}, {"id": "9", "category": "AI Basics", "question": "What is a feature?", "answer": "An input variable used by a model for prediction."}, {"id": "10", "category": "AI Basics", "question": "What is a label?", "answer": "The expected output or target value in supervised learning."}, {"id": "11", "category": "Python", "question": "What are Python's main data types?", "answer": "int, float, str, bool, list, tuple, set, and dict."}, {"id": "12", "category": "Python", "question": "What is the difference between a list and a tuple?", "answer": "Lists are mutable; tuples are immutable."}, {"id": "13", "category": "Python", "question": "What is the difference between a list and a set?", "answer": "Lists allow duplicates and preserve order; sets contain unique elements and are unordered."}, {"id": "14", "category": "Python", "question": "What is a dictionary?", "answer": "A collection of key-value pairs with unique keys."}, {"id": "15", "category": "Python", "question": "What is the difference between `==` and `is`?", "answer": "`==` compares values; `is` compares object identity."}, {"id": "16", "category": "Python", "question": "What is list comprehension?", "answer": "A concise way to create lists using a single expression."}, {"id": "17", "category": "Python", "question": "What is a function?", "answer": "A reusable block of code that performs a specific task."}, {"id": "18", "category": "Python", "question": "What is a lambda function?", "answer": "A small anonymous function written using the `lambda` keyword."}, {"id": "19", "category": "Python", "question": "What is exception handling?", "answer": "Handling runtime errors using `try`, `except`, `else`, and `finally`."}, {"id": "20", "category": "Python", "question": "Why do we use virtual environments?", "answer": "To isolate project dependencies and avoid version conflicts."}, {"id": "21", "category": "Python", "question": "What is a Python module?", "answer": "A file containing reusable Python code."}, {"id": "22", "category": "Python", "question": "What is a package?", "answer": "A collection of related Python modules."}, {"id": "23", "category": "Python", "question": "What are NumPy and Pandas used for?", "answer": "NumPy is used for numerical computing; Pandas is used for data analysis and manipulation."}, {"id": "24", "category": "Python", "question": "What is the Global Interpreter Lock (GIL)?", "answer": "A mechanism in CPython that allows only one thread to execute Python bytecode at a time."}, {"id": "25", "category": "Python", "question": "What is the difference between multithreading and multiprocessing?", "answer": "Multithreading shares the same process memory (good for I/O-bound tasks); multiprocessing uses separate processes (better for CPU-bound tasks)."}, {"id": "1", "category": "Python", "question": "How does Python manage memory?", "answer": "Python uses reference counting and a garbage collector to free unused objects.", "check": "Understanding of memory management"}, {"id": "2", "category": "Python", "question": "When would you use multithreading vs multiprocessing?", "answer": "Multithreading for I/O-bound tasks; multiprocessing for CPU-bound tasks because of the GIL.", "check": "Performance knowledge"}, {"id": "3", "category": "Python", "question": "How would you optimize a Python program processing millions of records?", "answer": "Use generators, vectorization (Pandas/NumPy), multiprocessing, chunking, and efficient algorithms.", "check": "Performance optimization"}, {"id": "4", "category": "Python", "question": "A Python application is consuming excessive memory. How would you debug it?", "answer": "Use memory profilers, identify large objects, release references, and process data in chunks.", "check": "Troubleshooting skills"}, {"id": "5", "category": "Python", "question": "Explain generators and when you would use them.", "answer": "Generators yield values lazily, reducing memory usage for large datasets.", "check": "Practical Python knowledge"}, {"id": "6", "category": "Python", "question": "What's the difference between deep copy and shallow copy?", "answer": "Shallow copy shares nested objects; deep copy recursively copies all objects.", "check": "Core Python concepts"}, {"id": "7", "category": "Python", "question": "What are decorators? Where have you used them?", "answer": "Functions that modify another function's behavior (logging, authentication, timing).", "check": "Practical experience"}, {"id": "8", "category": "Python", "question": "Explain *args and **kwargs.", "answer": "*args accepts positional arguments; **kwargs accepts keyword arguments.", "check": "Function design"}, {"id": "9", "category": "Python", "question": "How do you profile slow Python code?", "answer": "cProfile, line_profiler, memory_profiler, logging, and benchmarking.", "check": "Debugging ability"}, {"id": "10", "category": "Python", "question": "How would you make a Python application production-ready?", "answer": "Logging, exception handling, configuration management, testing, monitoring, and Docker.", "check": "Production experience"}, {"id": "11", "category": "AI/ML", "question": "Your model performs well on training data but poorly in production. What could be the reasons?", "answer": "Overfitting, data drift, feature mismatch, poor preprocessing, or different data distributions.", "check": "ML fundamentals"}, {"id": "12", "category": "AI/ML", "question": "How do you detect data drift?", "answer": "Compare feature distributions, statistical tests, monitoring dashboards, and model performance metrics.", "check": "MLOps awareness"}, {"id": "13", "category": "AI/ML", "question": "How do you choose between classification and regression?", "answer": "Classification predicts categories; regression predicts continuous values.", "check": "ML understanding"}, {"id": "14", "category": "AI/ML", "question": "A model's accuracy is high, but customers complain. Why?", "answer": "Accuracy alone may hide poor precision, recall, or class imbalance.", "check": "Evaluation metrics"}, {"id": "15", "category": "AI/ML", "question": "Which evaluation metrics would you use for fraud detection?", "answer": "Precision, Recall, F1-score, ROC-AUC, PR-AUC.", "check": "Metric selection"}, {"id": "16", "category": "AI/ML", "question": "Explain precision vs recall using a fraud detection example.", "answer": "Precision minimizes false positives; recall minimizes false negatives.", "check": "Business understanding"}, {"id": "17", "category": "AI/ML", "question": "How do you handle imbalanced datasets?", "answer": "Resampling, SMOTE, class weights, threshold tuning.", "check": "Practical ML"}, {"id": "18", "category": "AI/ML", "question": "Why perform feature engineering even with deep learning?", "answer": "Better features often improve performance and reduce training complexity.", "check": "Feature engineering"}, {"id": "19", "category": "AI/ML", "question": "What causes model bias?", "answer": "Biased training data, sampling issues, or algorithmic assumptions.", "check": "Responsible AI"}, {"id": "20", "category": "AI/ML", "question": "How do you monitor an ML model after deployment?", "answer": "Track accuracy, latency, drift, failures, and business KPIs.", "check": "Production ML"}, {"id": "21", "category": "APIs", "question": "How would you integrate an LLM into an existing application?", "answer": "Expose it through REST APIs, authentication, logging, caching, and monitoring.", "check": "Integration knowledge"}, {"id": "22", "category": "APIs", "question": "What would you do if an external AI API has high latency?", "answer": "Cache responses, async processing, retries, and fallback models.", "check": "System design"}, {"id": "23", "category": "APIs", "question": "How do you secure an AI API?", "answer": "Authentication, authorization, rate limiting, encryption, and audit logging.", "check": "Security awareness"}, {"id": "24", "category": "SQL", "question": "A query is taking 30 seconds. How would you optimize it?", "answer": "Check execution plan, indexes, joins, filters, and partitioning.", "check": "Database skills"}, {"id": "25", "category": "System Design", "question": "Design a document summarization service for 10,000 users.", "answer": "API → Queue → Worker → LLM → Storage → Monitoring → Scaling.", "check": "High-level architecture"}, {"id": "2", "category": "LLM Fundamentals", "question": "A user asks for today's news but the model answers with old information. What would you do?", "answer": "Use RAG or web retrieval instead of relying only on the base model.", "skill_checked": "Knowledge cutoff awareness", "difficulty": "Easy"}, {"id": "3", "category": "LLM Fundamentals", "question": "How would you explain an LLM to a business stakeholder?", "answer": "A model that predicts the next token to generate human-like text.", "skill_checked": "Communication skills", "difficulty": "Easy"}, {"id": "4", "category": "Prompt Engineering", "question": "The model misunderstands user intent. How would you improve the prompt?", "answer": "Add role, context, constraints and examples.", "skill_checked": "Prompt design", "difficulty": "Easy"}, {"id": "5", "category": "Prompt Engineering", "question": "When would you use few-shot prompting?", "answer": "Use few-shot prompting when examples help the model learn the desired structure, tone, classification labels, or edge-case handling.", "skill_checked": "Prompting knowledge", "difficulty": "Easy"}, {"id": "6", "category": "Prompt Engineering", "question": "A coding assistant generates verbose code. How do you control it?", "answer": "Use explicit formatting and output constraints.", "skill_checked": "Prompt control", "difficulty": "Medium"}, {"id": "7", "category": "LLM", "question": "A support bot hallucinates answers. What changes would you make?", "answer": "Use RAG, lower temperature, validate outputs.", "skill_checked": "Hallucination mitigation", "difficulty": "Medium"}, {"id": "8", "category": "LLM", "question": "Why would you reduce temperature for banking applications?", "answer": "To make responses more deterministic.", "skill_checked": "Inference parameters", "difficulty": "Easy"}, {"id": "9", "category": "LLM", "question": "When is a large context window useful?", "answer": "Long documents and conversations.", "skill_checked": "Context understanding", "difficulty": "Easy"}, {"id": "10", "category": "LLM", "question": "Why do tokens matter for cost?", "answer": "Billing and limits are token-based.", "skill_checked": "Token awareness", "difficulty": "Easy"}, {"id": "11", "category": "Transformer", "question": "Why are transformers preferred over RNNs?", "answer": "Parallel processing and long-range attention.", "skill_checked": "Architecture knowledge", "difficulty": "Medium"}, {"id": "12", "category": "Transformer", "question": "A sentence has ambiguous references. What helps the model resolve them?", "answer": "Self-attention.", "skill_checked": "Attention mechanism", "difficulty": "Medium"}, {"id": "13", "category": "LLM", "question": "What would cause context overflow?", "answer": "Input exceeds context window.", "skill_checked": "Limits awareness", "difficulty": "Easy"}, {"id": "14", "category": "Prompt Engineering", "question": "How would you force JSON output?", "answer": "Define the exact JSON schema, instruct the model to return only JSON, use structured output/tool calling when available, and validate the response before using it.", "skill_checked": "Structured prompting", "difficulty": "Medium"}, {"id": "15", "category": "LLM", "question": "How would you evaluate answer quality?", "answer": "Evaluate answer quality with factual accuracy, relevance, completeness, clarity, safety, latency, cost, and human review on realistic test cases.", "skill_checked": "Evaluation", "difficulty": "Medium"}, {"id": "16", "category": "Prompt Engineering", "question": "How do system prompts differ from user prompts?", "answer": "System prompts define behavior; user prompts request tasks.", "skill_checked": "Role separation", "difficulty": "Medium"}, {"id": "17", "category": "LLM", "question": "When should you use a smaller model?", "answer": "Low latency and lower-cost tasks.", "skill_checked": "Model selection", "difficulty": "Medium"}, {"id": "18", "category": "LLM", "question": "Why cache responses?", "answer": "Reduce latency and cost.", "skill_checked": "Optimization", "difficulty": "Medium"}, {"id": "19", "category": "LLM", "question": "A model leaks confidential data. What do you investigate?", "answer": "Training data, prompts, permissions and guardrails.", "skill_checked": "Security awareness", "difficulty": "Hard"}, {"id": "20", "category": "LLM", "question": "How do you monitor production LLMs?", "answer": "Track latency, cost, errors and feedback.", "skill_checked": "Operations", "difficulty": "Hard"}, {"id": "21", "category": "RAG", "question": "HR policy answers are outdated. Fix without retraining.", "answer": "Update the source documents, regenerate embeddings, re-index the vector store, and verify retrieval with test questions before deploying.", "skill_checked": "RAG vs fine-tuning", "difficulty": "Easy"}, {"id": "22", "category": "RAG", "question": "Retrieved documents are irrelevant. What would you tune?", "answer": "Tune chunk size and overlap, embedding model, metadata filters, top-k value, hybrid search, and reranking based on retrieval evaluation.", "skill_checked": "Retriever tuning", "difficulty": "Medium"}, {"id": "24", "category": "Vector DB", "question": "Why use a vector DB instead of SQL?", "answer": "A vector database supports semantic similarity search, allowing the system to retrieve content with similar meaning rather than only exact matching keywords.", "skill_checked": "Vector search", "difficulty": "Easy"}, {"id": "25", "category": "Embeddings", "question": "Two similar questions retrieve different docs. Why?", "answer": "Likely causes include a weak embedding model, poor chunk boundaries, missing metadata filters, low top-k, or no reranking step.", "skill_checked": "Embedding knowledge", "difficulty": "Medium"}, {"id": "26", "category": "RAG", "question": "How many chunks should be retrieved?", "answer": "Choose top-k empirically: start with a small value like 3?5, measure retrieval precision/recall, then adjust for answer quality, latency, and token cost.", "skill_checked": "Retrieval tuning", "difficulty": "Medium"}, {"id": "27", "category": "RAG", "question": "What metadata would you store?", "answer": "Store source URL or file, page/section, author, timestamp, document ID, access permissions, and version so answers can be cited and filtered safely.", "skill_checked": "Metadata", "difficulty": "Medium"}, {"id": "28", "category": "RAG", "question": "How do you keep knowledge current?", "answer": "Keep knowledge current by detecting document changes, regenerating affected embeddings, re-indexing the vector store, and tracking document versions.", "skill_checked": "Maintenance", "difficulty": "Easy"}, {"id": "29", "category": "RAG", "question": "How would you cite sources?", "answer": "Include citations from retrieved metadata such as document title, page, section, URL, or timestamp, and only cite sources actually used in the answer.", "skill_checked": "Grounding", "difficulty": "Medium"}, {"id": "30", "category": "Vector DB", "question": "Name common vector DBs.", "answer": "Pinecone, FAISS, Chroma, Milvus, Qdrant.", "skill_checked": "Ecosystem", "difficulty": "Easy"}, {"id": "31", "category": "RAG", "question": "How do you measure retrieval quality?", "answer": "Measure retrieval quality with precision@k, recall@k, MRR/NDCG, coverage of gold sources, and human review on representative queries.", "skill_checked": "Evaluation", "difficulty": "Hard"}, {"id": "32", "category": "Embeddings", "question": "Can embeddings replace keywords?", "answer": "Embeddings usually complement keywords rather than fully replacing them. Hybrid search combines semantic similarity with exact keyword matching for better recall.", "skill_checked": "Search knowledge", "difficulty": "Medium"}, {"id": "33", "category": "RAG", "question": "Sensitive docs should not be retrieved by everyone.", "answer": "Apply access-control-aware retrieval by filtering documents by user permissions before generation, not after the model has already seen restricted content.", "skill_checked": "Security", "difficulty": "Hard"}, {"id": "34", "category": "RAG", "question": "Why rerank results?", "answer": "Reranking reorders initially retrieved chunks using a stronger relevance model, improving the context sent to the LLM before answer generation.", "skill_checked": "Ranking", "difficulty": "Medium"}, {"id": "35", "category": "RAG", "question": "What is hybrid search?", "answer": "Hybrid search combines keyword search for exact terms with vector search for semantic meaning, often improving retrieval accuracy over either method alone.", "skill_checked": "Search concepts", "difficulty": "Medium"}, {"id": "36", "category": "RAG", "question": "Large PDF gives poor answers.", "answer": "Improve chunk size, overlap, headings, metadata, and retrieval/reranking settings so the model receives complete, relevant context.", "skill_checked": "Chunk strategy", "difficulty": "Medium"}, {"id": "37", "category": "RAG", "question": "How reduce hallucinations?", "answer": "Ground responses in retrieved context, require the model to cite evidence, lower temperature, and instruct it to say when evidence is missing.", "skill_checked": "Grounding", "difficulty": "Easy"}, {"id": "38", "category": "Embeddings", "question": "When regenerate embeddings?", "answer": "Regenerate embeddings when source content changes, the embedding model changes, preprocessing changes, or search quality noticeably degrades.", "skill_checked": "Lifecycle", "difficulty": "Medium"}, {"id": "39", "category": "RAG", "question": "What if no relevant docs found?", "answer": "If no relevant documents are found, say there is not enough evidence, ask a clarifying question, or escalate instead of inventing an answer.", "skill_checked": "Fallback", "difficulty": "Medium"}, {"id": "40", "category": "RAG", "question": "How evaluate end-to-end RAG?", "answer": "Evaluate end-to-end RAG with retrieval metrics, answer correctness, citation faithfulness, latency, cost, safety, and human feedback.", "skill_checked": "System thinking", "difficulty": "Hard"}, {"category": "Pandas", "question": "When would you use groupby() instead of pivot_table()?", "answer": "groupby() is used when performing aggregations on grouped data (e.g., sum, mean, count). pivot_table() is used when you also need to reshape the data into a matrix-like format with rows and columns while performing aggregation.", "id": "51"}, {"category": "Pandas", "question": "What is the difference between merge(), join(), and concat()?", "answer": "merge() combines DataFrames using one or more common columns, similar to SQL JOIN. join() is mainly index-based and is convenient for joining on indexes. concat() stacks DataFrames either vertically or horizontally without matching keys.", "id": "52"}, {"category": "Pandas", "question": "When would you use apply() instead of vectorized operations?", "answer": "Vectorized operations should always be preferred because they are implemented in optimized C code and are much faster. apply() should only be used when no built-in vectorized function exists or when custom row/column logic is required.", "id": "53"}, {"category": "Python", "question": "Why is itertuples() faster than iterrows()?", "answer": "iterrows() returns each row as a Series, which introduces significant overhead. itertuples() returns lightweight named tuples, making it much faster and more memory-efficient for row iteration.", "id": "54"}, {"category": "Python", "question": "When should you use a generator instead of a list?", "answer": "Use a generator when processing large datasets or streams because it produces values lazily, one at a time. This significantly reduces memory usage compared to creating an entire list in memory.", "id": "55"}, {"category": "Python", "question": "What problem does functools.lru_cache solve?", "answer": "lru_cache caches results of expensive function calls. If the same inputs occur again, the cached result is returned instead of recomputing, improving performance for recursive or repeated calculations.", "id": "56"}, {"category": "Python", "question": "When would you use ThreadPoolExecutor instead of ProcessPoolExecutor?", "answer": "ThreadPoolExecutor is suitable for I/O-bound tasks such as API calls, file operations, or database queries. ProcessPoolExecutor is better for CPU-intensive tasks like image processing or machine learning computations because it bypasses Python's GIL.", "id": "57"}, {"category": "SQL", "question": "When should you use a window function instead of GROUP BY?", "answer": "Use window functions when you need aggregated values while still retaining every row in the result. GROUP BY collapses rows into groups, whereas window functions calculate values without reducing the number of rows.", "id": "58"}, {"category": "Machine Learning", "question": "When would you choose Random Forest over Logistic Regression?", "answer": "Random Forest is suitable for complex, non-linear relationships and generally requires less feature engineering. Logistic Regression is preferred when the relationship is approximately linear and model interpretability is important.", "id": "59"}, {"category": "Machine Learning", "question": "Why would you choose XGBoost over a Decision Tree?", "answer": "A single Decision Tree is easy to interpret but prone to overfitting. XGBoost builds multiple trees sequentially, correcting previous errors, which usually results in higher accuracy and better generalization.", "id": "60"}, {"category": "Machine Learning", "question": "Why use StandardScaler instead of MinMaxScaler?", "answer": "StandardScaler standardizes data to zero mean and unit variance, making it suitable for algorithms like SVM, PCA, and Logistic Regression. MinMaxScaler scales values to a fixed range (typically 0–1), which is often useful for neural networks.", "id": "61"}, {"category": "Machine Learning", "question": "Why should One-Hot Encoding be avoided for high-cardinality features?", "answer": "One-Hot Encoding creates one column per unique value. With thousands of unique categories, this results in a very sparse, high-dimensional dataset that increases memory usage and training time.", "id": "62"}, {"category": "Deep Learning", "question": "Why is ReLU preferred over Sigmoid?", "answer": "ReLU is computationally efficient and helps mitigate the vanishing gradient problem. Sigmoid compresses outputs between 0 and 1, causing gradients to become very small in deep networks, slowing learning.", "id": "63"}, {"category": "Deep Learning", "question": "What is the purpose of Dropout?", "answer": "Dropout randomly disables a percentage of neurons during training, preventing the model from relying too heavily on specific neurons. This improves generalization and reduces overfitting.", "id": "64"}, {"category": "TensorFlow/PyTorch", "question": "Why call model.eval() during inference?", "answer": "model.eval() switches the model to inference mode. Layers like Dropout and Batch Normalization behave differently during training, and this method ensures consistent predictions.", "id": "65"}, {"category": "PyTorch", "question": "Why use torch.no_grad() during inference?", "answer": "It disables gradient computation, reducing memory usage and improving inference speed since gradients are unnecessary when making predictions.", "id": "66"}, {"category": "Hugging Face", "question": "What does AutoTokenizer do?", "answer": "AutoTokenizer automatically loads the correct tokenizer for a given pretrained model. It converts raw text into token IDs and attention masks required by transformer models.", "id": "67"}, {"category": "Hugging Face", "question": "Why use AutoModelForSequenceClassification instead of AutoModel?", "answer": "AutoModel returns only hidden representations. AutoModelForSequenceClassification adds a classification head on top of the transformer, making it directly usable for classification tasks.", "id": "68"}, {"category": "RAG", "question": "Why split documents into chunks?", "answer": "Large Language Models have context window limits. Chunking allows relevant sections to be embedded and retrieved efficiently, improving retrieval accuracy while staying within token limits.", "id": "69"}, {"category": "RAG", "question": "Why use chunk overlap?", "answer": "Important information often spans chunk boundaries. Overlapping chunks preserve context across boundaries, improving retrieval quality and reducing information loss.", "id": "70"}, {"category": "Vector Database", "question": "Why use FAISS instead of PostgreSQL?", "answer": "FAISS is optimized for high-dimensional vector similarity search using efficient indexing algorithms. PostgreSQL is optimized for relational queries and is much slower for embedding-based nearest-neighbor searches.", "id": "71"}, {"category": "Embeddings", "question": "When should embeddings be regenerated?", "answer": "Embeddings should be regenerated when document content changes, a new embedding model is adopted, or preprocessing/tokenization changes, ensuring semantic search remains accurate.", "id": "72"}, {"category": "LLM", "question": "What does the temperature parameter control?", "answer": "Temperature controls randomness in text generation. Lower values (0–0.3) produce deterministic outputs suitable for code or factual tasks, while higher values increase creativity and variation.", "id": "73"}, {"category": "LLM", "question": "What is the purpose of a system prompt?", "answer": "The system prompt defines the model's role, behavior, and constraints before processing user messages. It helps maintain consistent responses and enforce application-specific rules.", "id": "74"}, {"category": "OpenAI API", "question": "Why use streaming responses?", "answer": "Streaming returns tokens as they are generated instead of waiting for the full response. This reduces perceived latency and improves user experience in chat applications.", "id": "75"}, {"category": "OpenAI API", "question": "When should Tool Calling (Function Calling) be used?", "answer": "Tool calling should be used when the model needs to interact with external systems such as databases, APIs, calculators, or search services. It provides structured, reliable outputs instead of parsing free-form text.", "id": "76"}, {"category": "LangChain", "question": "Why use a Retriever instead of sending all documents to the LLM?", "answer": "Sending all documents is expensive and often exceeds context limits. A retriever fetches only the most relevant chunks, reducing token usage, latency, and cost while improving answer quality.", "id": "77"}, {"category": "LangChain", "question": "What is the purpose of RecursiveCharacterTextSplitter?", "answer": "It recursively splits documents using separators like paragraphs, sentences, and spaces to create well-sized chunks while preserving as much semantic context as possible.", "id": "78"}, {"category": "LangGraph", "question": "Why is state management important?", "answer": "State allows different nodes in a workflow to share information, remember previous tool outputs, and coordinate multi-step reasoning, making complex agent workflows reliable and maintainable.", "id": "79"}, {"category": "MLOps", "question": "Why use MLflow?", "answer": "MLflow tracks experiments, parameters, metrics, models, and artifacts. It simplifies experiment comparison, model versioning, and reproducibility across different environments and teams.", "id": "80"}, {"id": "CQ1", "category": "Coding Questions", "question": "How do you reverse a string in Python?", "answer": "Use slicing: text[::-1]. In an interview, also mention that this creates a new string because Python strings are immutable.", "difficulty": "Easy", "skill_checked": "String manipulation"}, {"id": "CQ2", "category": "Coding Questions", "question": "How do you check if a string is a palindrome?", "answer": "Normalize the string if needed, then compare it with its reverse. Example: cleaned == cleaned[::-1]. For production input, handle casing, spaces, and punctuation.", "difficulty": "Easy", "skill_checked": "String logic"}, {"id": "CQ3", "category": "Coding Questions", "question": "How do you find duplicates in a list?", "answer": "Use a set to track seen values and another set/list for duplicates. This gives O(n) time complexity instead of comparing every pair.", "difficulty": "Easy", "skill_checked": "Hash sets"}, {"id": "CQ4", "category": "Coding Questions", "question": "How do you count character frequency in a string?", "answer": "Use collections.Counter in Python, or use a dictionary/hash map manually. The core idea is to increment a count for each character as you scan once.", "difficulty": "Easy", "skill_checked": "Hash maps"}, {"id": "CQ5", "category": "Coding Questions", "question": "How do you find the second largest number in an array?", "answer": "Track largest and second_largest in one pass. Update both carefully when a new maximum appears, and handle duplicate values based on whether distinct values are required.", "difficulty": "Medium", "skill_checked": "Array traversal"}, {"id": "CQ6", "category": "Coding Questions", "question": "How do you merge two sorted arrays?", "answer": "Use two pointers, one for each array, repeatedly append the smaller current value, then append any remaining elements. This runs in O(n + m) time.", "difficulty": "Medium", "skill_checked": "Two pointers"}, {"id": "CQ7", "category": "Coding Questions", "question": "How do you detect a cycle in a linked list?", "answer": "Use Floyd?s slow and fast pointer algorithm. Move slow by one step and fast by two; if they meet, a cycle exists.", "difficulty": "Medium", "skill_checked": "Linked lists"}, {"id": "CQ8", "category": "Coding Questions", "question": "How do you implement binary search?", "answer": "Maintain left and right indexes, check the middle element, and discard half the search space each step. It requires sorted input and runs in O(log n) time.", "difficulty": "Medium", "skill_checked": "Search algorithms"}, {"id": "CQ9", "category": "Coding Questions", "question": "What is the difference between BFS and DFS?", "answer": "BFS explores level by level using a queue and is useful for shortest paths in unweighted graphs. DFS explores depth first using recursion or a stack.", "difficulty": "Medium", "skill_checked": "Graph traversal"}, {"id": "CQ10", "category": "Coding Questions", "question": "How do you find the first non-repeating character in a string?", "answer": "Count character frequencies in one pass, then scan the string again and return the first character with count 1. This keeps the solution O(n).", "difficulty": "Medium", "skill_checked": "Hash maps and ordering"}, {"id": "CQ11", "category": "Coding Questions", "question": "How do you approach a coding problem in an interview?", "answer": "Clarify requirements and edge cases, explain a brute-force idea, improve it, discuss time and space complexity, then code cleanly and test with examples.", "difficulty": "Easy", "skill_checked": "Problem-solving process"}, {"id": "CQ12", "category": "Coding Questions", "question": "How do you optimize code that is timing out?", "answer": "Identify the bottleneck, reduce nested loops where possible, use better data structures, avoid repeated work with caching, and verify complexity with input size.", "difficulty": "Medium", "skill_checked": "Optimization"}, {"id": "CQ13", "category": "Coding Questions", "question": "When would you use a stack?", "answer": "Use a stack for last-in-first-out problems such as balanced parentheses, undo operations, expression parsing, recursion simulation, and monotonic stack problems.", "difficulty": "Easy", "skill_checked": "Data structures"}, {"id": "CQ14", "category": "Coding Questions", "question": "When would you use dynamic programming?", "answer": "Use dynamic programming when a problem has overlapping subproblems and optimal substructure. Common signs include counting ways, min/max cost, and repeated recursive states.", "difficulty": "Hard", "skill_checked": "Dynamic programming"}, {"id": "CQ15", "category": "Coding Questions", "question": "How do you explain time and space complexity?", "answer": "Time complexity describes how runtime grows with input size; space complexity describes extra memory used. Use Big-O to focus on growth rate, not exact timing.", "difficulty": "Easy", "skill_checked": "Complexity analysis"}];
