ted/reversed input where relevant, and cases near limits.", "type": "Coding", "difficulty": "Easy", "skill_checked": "Testing mindset"}, {"id": "S15Q06", "category": "Set 15 - Pandas & Analytics", "question": "[Coding] How would you refactor messy Pandas/Analytics code?", "answer": "Break large functions into smaller units, rename unclear variables, remove duplication, isolate side effects, add tests first, and preserve behavior while improving readability.", "type": "Coding", "difficulty": "Medium", "skill_checked": "Code quality"}, {"id": "S15Q07", "category": "Set 15 - Pandas & Analytics", "question": "[Scenario] A production Pandas/Analytics feature is giving inconsistent results. What do you check first?", "answer": "Check recent changes, inputs, logs, configuration, dependency versions, cached data, and monitoring signals. Reproduce the issue with a minimal case before changing code.", "type": "Scenario", "difficulty": "Medium", "skill_checked": "Debugging"}, {"id": "S15Q08", "category": "Set 15 - Pandas & Analytics", "question": "[Scenario] Users say the Pandas/Analytics solution is too slow. How do you investigate?", "answer": "Measure before optimizing: inspect latency, query/runtime profiles, input sizes, hot paths, network calls, and resource usage. Fix the biggest bottleneck first.", "type": "Scenario", "difficulty": "Medium", "skill_checked": "Performance troubleshooting"}, {"id": "S15Q09", "category": "Set 15 - Pandas & Analytics", "question": "[Scenario] A teammate proposes a quick fix for a Pandas/Analytics issue. How do you respond?", "answer": "Validate the root cause, discuss risks, add a regression test if possible, and choose the smallest safe fix. Quick is good; unverified is expensive.", "type": "Scenario", "difficulty": "Medium", "skill_checked": "Engineering judgment"}, {"id": "S15Q10", "category": "Set 15 - Pandas & Analytics", "question": "[Scenario] Your Pandas/Analytics implementation works locally but fails in production. What could be ness needs tests, logging, monitoring, error handling, security controls, documentation, deployment automation, rollback strategy, and clear ownership.", "type": "Advanced", "difficulty": "Hard", "skill_checked": "Production design"}];
const ORDER=["Set 01 - Python Fundamentals", "Set 02 - Data Structures", "Set 03 - Algorithms", "Set 04 - SQL & Databases", "Set 05 - APIs & Backend", "Set 06 - Machine Learning", "Set 07 - Deep Learning", "Set 08 - Generative AI", "Set 09 - RAG & Vector Search", "Set 10 - AI Agents", "Set 11 - MLOps", "Set 12 - Cloud & DevOps", "Set 13 - Security", "Set 14 - System Design", "Set 15 - Pandas & Analytics"];
function render(f=""){
const app=document.getElementById("app");app.innerHTML="";
ORDER.forEach(cat=>{
const items=DATA.filter(x=>(x.category||"Other")==cat&&((x.question||"").toLowerCase().includes(f)||cat.toLowerCase().includes(f)));
if(!items.length)return;
const card=document.createElement("div");card.className="card";
const head=document.createElement("div");head.className="head";
head.innerHTML=cat+" <span class='count'>"+items.length+"</span>";
const list=document.createElement("div");list.className="list";
head.onclick=()=>list.style.display=list.style.display==="block"?"none":"block";
items.forEach(it=>{
const q=document.createElement("div");q.className="q";q.textContent="❓ "+it.question;
const a=document.createElement("div");a.className="a";
let h="<div class='tag'>Answer</div><div>"+(it.answer||"")+"</div>";
if(it.type)h+="<div class='tag'>Type</div><div>"+it.type+"</div>";
if(it.check)h+="<div class='tag'>Check</div><div>"+it.check+"</div>";
if(it.skill_checked)h+="<div class='tag'>Skill Checked</div><div>"+it.skill_checked+"</div>";
if(it.difficulty)h+="<div class='tag'>Difficulty</div><div>"+it.difficulty+"</div>";
a.innerHTML=h;
q.onclick=()=>a.style.display=a.style.display==="block"?"none":"block";
list.appendChild(q);list.appendChild(a);
});
card.appendChild(head);card.appendChild(list);app.appendChild(card);
});
}
render();
document.getElementById("search").oninput=e=>render(e.target.value.toLowerCase());
</script></body></html>
